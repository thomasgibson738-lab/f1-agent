<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Race Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <!-- Top brand bar -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">F1</span>
      <span class="brand-text">RACE&nbsp;CENTER</span>
    </div>

    <!-- Top-level page nav -->
    <nav class="pagenav" id="pagenav">
      <button data-page="results" class="active">Results</button>
      <button data-page="news">News</button>
      <button data-page="chat">Ask AI</button>
    </nav>

    <!-- Inline season / round selectors (broadcast-style control strip) -->
    <div class="controls" id="results-controls">
      <div class="control">
        <label for="season">SEASON</label>
        <select id="season"></select>
      </div>
      <div class="control control-wide">
        <label for="round">ROUND</label>
        <select id="round"></select>
      </div>
    </div>
  </header>

  <!-- ===== Results page ===== -->
  <div id="page-results">
    <section class="hero">
      <div class="hero-accent"></div>
      <div class="hero-body">
        <p class="hero-kicker" id="hero-kicker">—</p>
        <h1 id="race-title">Loading…</h1>
        <p id="race-meta" class="hero-meta"></p>
      </div>
      <div class="hero-visual" aria-hidden="true"></div>
    </section>

    <main>
      <nav class="tabs" id="tabs"></nav>
      <section id="panel" class="panel"></section>
    </main>
  </div>

  <!-- ===== News page ===== -->
  <div id="page-news" hidden>
    <section class="hero">
      <div class="hero-accent"></div>
      <div class="hero-body">
        <p class="hero-kicker">Daily digest</p>
        <h1>Latest F1 News</h1>
        <p id="news-updated" class="hero-meta"></p>
      </div>
      <div class="hero-visual" aria-hidden="true"></div>
    </section>
    <main>
      <section id="news-list" class="news-list"></section>
    </main>
  </div>

  <!-- ===== Chat page ===== -->
  <div id="page-chat" hidden>
    <section class="hero">
      <div class="hero-accent"></div>
      <div class="hero-body">
        <p class="hero-kicker">Ask AI</p>
        <h1>F1 Assistant</h1>
        <p class="hero-meta">Ask about results, standings, lap times, or the latest news.</p>
      </div>
      <div class="hero-visual" aria-hidden="true"></div>
    </section>
    <main>
      <div class="chat">
        <div id="chat-log" class="chat-log"></div>
        <form id="chat-form" class="chat-input">
          <input
            id="chat-text"
            type="text"
            autocomplete="off"
            placeholder="e.g. Who won the 2024 Monaco GP? How do the standings look?"
          />
          <button type="submit" id="chat-send">Send</button>
        </form>
      </div>
    </main>
  </div>

  <footer>
    <span id="api-status"></span>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
